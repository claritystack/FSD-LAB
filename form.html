<html>

<head>

    <title>Form Validation</title>

    <script src="script.js"></script>

    <style>
        body {
            background: #f2f2f2;
            font-family: Arial;
        }

        form {
            background: white;
            padding: 25px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 6px;
            width: 90%;
        }

        input[type="submit"] {
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <center>

        <h1 style="color: green;">
            Experiment 3
        </h1>

        <h3>
            Validate Input Fields in HTML Form
        </h3>

        <form onsubmit="return validateForm()">

            <label for="fname">First Name:</label><br>
            <input type="text" id="fname" placeholder="Enter your first name" required minlength="2">
            <br><br>

            <label for="lname">Last Name:</label><br>
            <input type="text" id="lname" placeholder="Enter your last name" required minlength="2">
            <br><br>

            <label for="email">Email Id:</label><br>
            <input type="email" id="email" placeholder="Enter your email address" required>
            <br><br>

            <label for="password">Password:</label><br>
            <input type="password" id="password" placeholder="Enter a secure password" required minlength="8">
            <br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                title="Format: 123-456-7890" required>
            <br><br>

            <input type="submit" value="Submit">

        </form>

    </center>

</body>

</html>
